<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JPS Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f3f4f6;
      color: #111827;
    }
    header {
      background: #111827;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #d1d5db;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #2563eb;
      color: white;
    }
    .panel {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .panel.active {
      display: block;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .full {
      grid-column: 1 / -1;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button.primary {
      margin-top: 16px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    .status {
      margin-top: 12px;
      font-size: 14px;
    }
    .preview {
      margin-top: 16px;
      padding: 14px;
      background: #f8fafc;
      border-radius: 12px;
      white-space: pre-wrap;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <header>
    <div><strong>JPS Admin Workspace</strong></div>
    <button id="logoutBtn" class="tab-btn">Log out</button>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="cvPanel">Manual CV Annotation</button>
      <button class="tab-btn" data-tab="jobPanel">Manual Job Annotation</button>
      <button class="tab-btn" data-tab="parserPanel">LLM Job PDF Parser</button>
    </div>

    <section id="cvPanel" class="panel active">
      <h2>Manual CV Annotation</h2>
      <div class="grid">
        <div>
          <label>CV ID</label>
          <input id="cv_id" />
        </div>
        <div>
          <label>Source Ref</label>
          <input id="cv_source_ref" />
        </div>

        <div>
          <label>Primary Role</label>
          <input id="cv_primary_role" />
        </div>
        <div>
          <label>Seniority</label>
          <select id="cv_seniority">
            <option value="">Select</option>
            <option value="junior">junior</option>
            <option value="mid">mid</option>
            <option value="senior">senior</option>
          </select>
        </div>

        <div>
          <label>Normalized Roles (comma separated)</label>
          <textarea id="cv_normalized_roles"></textarea>
        </div>
        <div>
          <label>Skills (comma separated)</label>
          <textarea id="cv_skills"></textarea>
        </div>

        <div>
          <label>Languages (comma separated)</label>
          <textarea id="cv_languages"></textarea>
        </div>
        <div>
          <label>Education (comma separated)</label>
          <textarea id="cv_education"></textarea>
        </div>

        <div>
          <label>Industries (comma separated)</label>
          <textarea id="cv_industries"></textarea>
        </div>
        <div>
          <label>Locations (comma separated)</label>
          <textarea id="cv_locations"></textarea>
        </div>

        <div>
          <label>Years Experience Total</label>
          <input id="cv_years_experience_total" type="number" step="0.1" />
        </div>
        <div>
          <label>Ambiguity Flag</label>
          <select id="cv_ambiguity_flag">
            <option value="false">false</option>
            <option value="true">true</option>
          </select>
        </div>

        <div class="full">
          <label>Role Experience JSON</label>
          <textarea id="cv_role_experience" placeholder='[{"role":"data analyst","years":2}]'></textarea>
        </div>

        <div class="full">
          <label>Raw Text</label>
          <textarea id="cv_raw_text"></textarea>
        </div>

        <div class="full">
          <label>Notes</label>
          <textarea id="cv_annotation_notes"></textarea>
        </div>
      </div>
      <button id="saveCvBtn" class="primary">Save CV Annotation</button>
      <div id="cvStatus" class="status"></div>
    </section>

    <section id="jobPanel" class="panel">
      <h2>Manual Job Annotation</h2>
      <div class="grid">
        <div>
          <label>Job ID</label>
          <input id="job_id" />
        </div>
        <div>
          <label>Job URL</label>
          <input id="job_url" />
        </div>

        <div>
          <label>Raw Job Title</label>
          <input id="job_title" />
        </div>
        <div>
          <label>Company Name</label>
          <input id="job_company_name" />
        </div>

        <div>
          <label>Country</label>
          <input id="job_country" />
        </div>
        <div>
          <label>Employment Type</label>
          <input id="job_employment_type" />
        </div>

        <div>
          <label>Primary Role</label>
          <input id="job_primary_role" />
        </div>
        <div>
          <label>Seniority</label>
          <select id="job_seniority">
            <option value="">Select</option>
            <option value="junior">junior</option>
            <option value="mid">mid</option>
            <option value="senior">senior</option>
          </select>
        </div>

        <div>
          <label>Normalized Roles (comma separated)</label>
          <textarea id="job_normalized_roles"></textarea>
        </div>
        <div>
          <label>Skills (comma separated)</label>
          <textarea id="job_skills"></textarea>
        </div>

        <div>
          <label>Languages (comma separated)</label>
          <textarea id="job_languages"></textarea>
        </div>
        <div>
          <label>Education (comma separated)</label>
          <textarea id="job_education"></textarea>
        </div>

        <div>
          <label>Industries (comma separated)</label>
          <textarea id="job_industries"></textarea>
        </div>
        <div>
          <label>Locations (comma separated)</label>
          <textarea id="job_locations"></textarea>
        </div>

        <div>
          <label>Years Experience Required</label>
          <input id="job_years_experience_required" type="number" step="0.1" />
        </div>
        <div>
          <label>Ambiguity Flag</label>
          <select id="job_ambiguity_flag">
            <option value="false">false</option>
            <option value="true">true</option>
          </select>
        </div>

        <div class="full">
          <label>Raw Job Text</label>
          <textarea id="job_raw_text"></textarea>
        </div>

        <div class="full">
          <label>Notes</label>
          <textarea id="job_annotation_notes"></textarea>
        </div>
      </div>
      <button id="saveJobBtn" class="primary">Save Job Annotation</button>
      <div id="jobStatus" class="status"></div>
    </section>

    <section id="parserPanel" class="panel">
      <h2>LLM Job PDF Parser</h2>
      <div class="grid">
        <div class="full">
          <label>Upload Job PDF</label>
          <input id="jobPdfFile" type="file" accept="application/pdf" />
        </div>

        <div>
          <label>Model Name</label>
          <input id="parser_model_name" value="mistral" />
        </div>
        <div>
          <label>Prompt Version</label>
          <input id="parser_prompt_version" value="v1" />
        </div>
      </div>

      <button id="parseJobPdfBtn" class="primary">Parse Job PDF</button>
      <div id="parserStatus" class="status"></div>
      <div id="parserPreview" class="preview"></div>
    </section>
  </div>

  <script type="module" src="./js/admin.js"></script>
</body>
</html>
