<section id="cvParserPanel" class="panel">
  <h2>LLM CV PDF Parser</h2>
  <p class="hint">
    GDPR-safe mode: uploaded CV is used only for parsing and is deleted immediately after parsing.
    No raw CV PDF URL or unredacted text is stored.
  </p>

  <div class="grid">
    <div class="full">
      <label for="cvPdfFile">Upload CV PDF</label>
      <input id="cvPdfFile" type="file" accept="application/pdf" />
    </div>

    <div>
      <label for="cv_parser_provider">Provider</label>
      <select id="cv_parser_provider">
        <option value="mistral">mistral</option>
        <option value="openrouter">openrouter</option>
      </select>
    </div>

    <div>
      <label for="cv_parser_model_name">Model Name</label>
      <input id="cv_parser_model_name" value="mistral-small-latest" />
    </div>

    <div>
      <label for="cv_parser_prompt_version">Prompt Version</label>
      <input id="cv_parser_prompt_version" value="cv_admin_v1" />
    </div>

    <div>
      <label for="cv_parser_candidate_ref">Candidate Ref (optional)</label>
      <input id="cv_parser_candidate_ref" placeholder="internal_eval_candidate_001" />
    </div>

    <div>
      <label for="cv_parser_test_mode">Test Mode</label>
      <select id="cv_parser_test_mode">
        <option value="false">false</option>
        <option value="true">true</option>
      </select>
    </div>
  </div>

  <button id="parseCvPdfBtn" type="button" class="primary">Parse CV PDF</button>
  <div id="cvParserStatus" class="status"></div>
  <div id="cvParserPreview" class="preview"></div>
</section>
